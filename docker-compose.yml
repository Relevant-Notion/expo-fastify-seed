services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: seed
      POSTGRES_PASSWORD: seed
      POSTGRES_DB: seed
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "seed"]
      interval: 3s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.dev
    ports:
      - "8080:8080"
    volumes:
      - ./apps/api/src:/app/apps/api/src
      - ./packages/shared/src:/app/packages/shared/src
    environment:
      DATABASE_URL: postgres://seed:seed@db:5432/seed
      PORT: 8080
      LOG_LEVEL: info
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
